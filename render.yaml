services:
  - type: web
    name: maternalmate
    runtime: python
    plan: free
    env: python
    
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput

    startCommand: gunicorn maternalmate.wsgi:application
    
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "maternalmate.onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: maternalmate-db         # Links to the database below
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false                     # You set this manually in Render dashboard
      - key: WEB_CONCURRENCY
        value: "2"

databases:
  - name: maternalmate-db
    databaseName: maternalmate
    user: maternalmate_user
    plan: free
    region: singapore      